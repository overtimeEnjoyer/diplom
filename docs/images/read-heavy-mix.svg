<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="420" viewBox="0 0 1100 420">
  <style>
    .bg { fill: #0b1220; }
    .card { fill: #0f172a; stroke: #334155; stroke-width: 2; rx: 16; }
    .h { fill: #93c5fd; font: 18px ui-sans-serif, system-ui; font-weight: 700; }
    .t { fill: #e2e8f0; font: 15px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
    .s { fill: #94a3b8; font: 14px ui-sans-serif, system-ui; }
    .barR { fill: #22c55e; }
    .barW { fill: #f59e0b; }
  </style>
  <rect class="bg" x="0" y="0" width="1100" height="420"/>

  <rect class="card" x="40" y="40" width="1020" height="340"/>
  <text class="h" x="70" y="85">Read-heavy workload model (educational platform)</text>
  <text class="s" x="70" y="115">Typical peak browsing: 95% reads / 5% writes (progress, feedback, confirmations)</text>

  <text class="t" x="70" y="170">Reads (catalog + pricing)</text>
  <rect class="barR" x="70" y="190" width="860" height="34" rx="8"/>
  <text class="t" x="945" y="214">95%</text>

  <text class="t" x="70" y="270">Writes (progress + confirm + feedback)</text>
  <rect class="barW" x="70" y="290" width="45" height="34" rx="8"/>
  <text class="t" x="130" y="314">5%</text>

  <text class="s" x="70" y="350">Why it matters: read queries can be scaled with replicas/cache; writes are bounded by DB transactions.</text>
</svg>

