<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="560" viewBox="0 0 1100 560">
  <style>
    .box { fill: #0b1220; stroke: #334155; stroke-width: 2; rx: 14; }
    .t { fill: #e2e8f0; font: 15px ui-monospace, Menlo, Monaco, Consolas, monospace; }
    .h { fill: #93c5fd; font: 17px ui-sans-serif, system-ui, sans-serif; font-weight: 700; }
    .s { fill: #a5b4fc; font: 13px ui-sans-serif, system-ui, sans-serif; }
    .arrow { stroke: #60a5fa; stroke-width: 2.5; marker-end: url(#m); fill: none; }
  </style>
  <defs>
    <marker id="m" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#60a5fa"/>
    </marker>
  </defs>

  <!-- Row 1 -->
  <rect x="30" y="40" width="260" height="110" class="box"/>
  <text x="55" y="75" class="h">Client</text>
  <text x="55" y="102" class="t">Browser / SPA</text>
  <text x="55" y="125" class="s">JWT, REST</text>

  <rect x="330" y="40" width="320" height="110" class="box"/>
  <text x="355" y="75" class="h">Vercel Function</text>
  <text x="355" y="102" class="t">api/index.js</text>
  <text x="355" y="125" class="s">await res.finish</text>

  <rect x="690" y="40" width="380" height="150" class="box"/>
  <text x="715" y="75" class="h">Express app (singleton)</text>
  <text x="715" y="102" class="t">createApp() on warm instance</text>
  <text x="715" y="125" class="s">CORS, helmet, json, routes</text>
  <text x="715" y="148" class="s">lazy DB init on /api/* only</text>

  <line x1="290" y1="95" x2="330" y2="95" class="arrow"/>
  <line x1="650" y1="95" x2="690" y2="95" class="arrow"/>

  <!-- Row 2 -->
  <rect x="330" y="200" width="320" height="130" class="box"/>
  <text x="355" y="235" class="h">Cold start path</text>
  <text x="355" y="262" class="s">first /api/* request pays:</text>
  <text x="355" y="282" class="s">initDatabase() + initModels()</text>
  <text x="355" y="302" class="s">mitigation: lazy init, pool max=1</text>

  <rect x="690" y="200" width="380" height="130" class="box"/>
  <text x="715" y="235" class="h">PostgreSQL (BaaS)</text>
  <text x="715" y="262" class="t">Neon / Supabase + pooler</text>
  <text x="715" y="285" class="s">Sequelize singleton pool</text>
  <text x="715" y="308" class="s">risk: connection bursts at scale</text>

  <line x1="490" y1="150" x2="490" y2="200" class="arrow"/>
  <line x1="880" y1="190" x2="880" y2="200" class="arrow"/>

  <!-- Legend -->
  <text x="30" y="380" class="s">Flow: Client -&gt; Vercel handler -&gt; Express; first API hit initializes DB; Sequelize talks to pooled Postgres.</text>
</svg>
