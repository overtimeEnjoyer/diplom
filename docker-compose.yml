services:
  postgres:
    image: postgres:16-alpine
    container_name: rok-m-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rok_m_dev
    ports:
      - '5432:5432'
    volumes:
      - rok_m_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  rok_m_pgdata:
