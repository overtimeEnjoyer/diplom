name: CD

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cd-production
  cancel-in-progress: false

jobs:
  deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.sha || github.event.workflow_run.head_sha }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9.14.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate deployment secrets
        run: |
          trim() { printf '%s' "$1" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//'; }
          export DATABASE_URL="$(trim "$DATABASE_URL")"
          export VERCEL_TOKEN="$(trim "$VERCEL_TOKEN")"
          export VERCEL_ORG_ID="$(trim "$VERCEL_ORG_ID")"
          export VERCEL_PROJECT_ID="$(trim "$VERCEL_PROJECT_ID")"

          missing=0
          for name in DATABASE_URL VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing secret: $name"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "Add secrets under Settings → Secrets → Actions (or Environment production)."
            exit 1
          fi
          if echo "$VERCEL_PROJECT_ID" | grep -q '[[:space:]]'; then
            echo "::error::VERCEL_PROJECT_ID must be a single id (no spaces). Re-save the secret without trailing newline."
            exit 1
          fi
          if echo "$DATABASE_URL" | grep -Eq 'localhost|127\.0\.0\.1'; then
            echo "::error::DATABASE_URL must be a cloud PostgreSQL URL (Neon/Supabase), not localhost."
            exit 1
          fi
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Run database migrations
        run: pnpm db:migrate
        env:
          NODE_ENV: production
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Deploy to Vercel (production)
        id: deploy
        run: |
          set -euo pipefail
          trim() { printf '%s' "$1" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//'; }
          export VERCEL_TOKEN="$(trim "$VERCEL_TOKEN")"
          export VERCEL_ORG_ID="$(trim "$VERCEL_ORG_ID")"
          export VERCEL_PROJECT_ID="$(trim "$VERCEL_PROJECT_ID")"
          pnpm dlx vercel@latest deploy --prod --yes --token "$VERCEL_TOKEN" | tee deploy.log
          url=$(grep -Eo 'https://[^ ]+\.vercel\.app' deploy.log | tail -1)
          if [ -z "$url" ]; then
            echo "::error::Could not parse deployment URL from Vercel output"
            exit 1
          fi
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Deployed to $url"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Smoke test /health
        run: |
          url="${{ steps.deploy.outputs.url }}"
          echo "Checking $url/health"
          curl -fsS "$url/health"
          curl -fsS "$url/health/db" || {
            echo "::warning::/health/db failed — check DATABASE_URL in Vercel Production env vars"
            exit 1
          }
