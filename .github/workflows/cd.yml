name: CD

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cd-production
  cancel-in-progress: false

jobs:
  deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.sha || github.event.workflow_run.head_sha }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9.14.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate deployment secrets
        run: |
          trim() { printf '%s' "$1" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//'; }
          export DATABASE_URL="$(trim "$DATABASE_URL")"
          export VERCEL_TOKEN="$(trim "$VERCEL_TOKEN")"
          export VERCEL_ORG_ID="$(trim "$VERCEL_ORG_ID")"
          export VERCEL_PROJECT_ID="$(trim "$VERCEL_PROJECT_ID")"

          missing=0
          for name in DATABASE_URL VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing secret: $name"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "Add secrets under Settings → Secrets → Actions (or Environment production)."
            exit 1
          fi
          if echo "$VERCEL_PROJECT_ID" | grep -q '[[:space:]]'; then
            echo "::error::VERCEL_PROJECT_ID must be a single id (no spaces). Re-save the secret without trailing newline."
            exit 1
          fi
          if echo "$DATABASE_URL" | grep -Eq 'localhost|127\.0\.0\.1'; then
            echo "::error::DATABASE_URL must be a cloud PostgreSQL URL (Neon/Supabase), not localhost."
            exit 1
          fi
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Run database migrations
        run: pnpm db:migrate
        env:
          NODE_ENV: production
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Deploy to Vercel (production)
        id: deploy
        run: |
          set -euo pipefail
          trim() { printf '%s' "$1" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//'; }
          export VERCEL_TOKEN="$(trim "$VERCEL_TOKEN")"
          export VERCEL_ORG_ID="$(trim "$VERCEL_ORG_ID")"
          export VERCEL_PROJECT_ID="$(trim "$VERCEL_PROJECT_ID")"
          pnpm dlx vercel@latest deploy --prod --yes --token "$VERCEL_TOKEN" | tee deploy.log
          # Prefer stable Production alias (not *-team-projects.vercel.app deployment URL — often SSO-protected).
          url=$(grep -i 'Production:' deploy.log | grep -Eo 'https://[^ ]+' | head -1 || true)
          if [ -z "$url" ]; then
            url=$(grep -Eo 'https://[^ ]+\.vercel\.app' deploy.log | grep -v -- '-projects\.vercel\.app' | tail -1 || true)
          fi
          if [ -z "$url" ]; then
            url=$(grep -Eo 'https://[^ ]+\.vercel\.app' deploy.log | tail -1)
          fi
          if [ -z "$url" ]; then
            echo "::error::Could not parse deployment URL from Vercel output"
            exit 1
          fi
          echo "deployment_url=$url" >> "$GITHUB_OUTPUT"

          smoke_url="$(trim "${PRODUCTION_URL:-}")"
          if [ -z "$smoke_url" ]; then
            smoke_url="$url"
          fi
          echo "url=$smoke_url" >> "$GITHUB_OUTPUT"
          echo "Deployed: $url"
          echo "Smoke test URL: $smoke_url"
          if echo "$url" | grep -q '\-projects\.vercel\.app'; then
            if echo "$smoke_url" | grep -q '\-projects\.vercel\.app'; then
              if [ -z "$(trim "${VERCEL_AUTOMATION_BYPASS_SECRET:-}")" ]; then
                echo "::warning::Deployment URL is behind Vercel SSO. Set GitHub secret PRODUCTION_URL to your public alias (Vercel → Domains),"
                echo "or VERCEL_AUTOMATION_BYPASS_SECRET (Vercel → Deployment Protection → Protection Bypass for Automation)."
              fi
            fi
          fi
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          PRODUCTION_URL: ${{ secrets.PRODUCTION_URL }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}

      - name: Smoke test /health
        run: |
          url="${{ steps.deploy.outputs.url }}"
          deployment_url="${{ steps.deploy.outputs.deployment_url }}"
          echo "Checking $url/health (deployment: $deployment_url)"

          trim() { printf '%s' "$1" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//'; }
          bypass="$(trim "${VERCEL_AUTOMATION_BYPASS_SECRET:-}")"

          curl_args=(-fsS)
          if [ -n "$bypass" ]; then
            curl_args+=(
              -H "x-vercel-protection-bypass: ${bypass}"
              -H "x-vercel-set-bypass-cookie: true"
            )
            echo "Using Vercel automation protection bypass"
          fi

          http_code=$(curl "${curl_args[@]}" -o /tmp/health.json -w "%{http_code}" "$url/health" || true)
          if [ "$http_code" = "401" ]; then
            echo "::error::HTTP 401 — Vercel Deployment Protection blocks curl (not your Express API)."
            echo ""
            echo "Do ONE of these (then re-run CD):"
            echo "  A) Vercel → diplom → Settings → Deployment Protection"
            echo "     → turn OFF 'Vercel Authentication' for Production (or for All)."
            echo "  B) Same page → Protection Bypass for Automation → copy secret"
            echo "     → GitHub → Secrets → VERCEL_AUTOMATION_BYPASS_SECRET"
            echo "  C) Vercel → Domains → copy production URL (e.g. https://diplom-xxxx.vercel.app)"
            echo "     → GitHub → Secrets → PRODUCTION_URL (without SSO)"
            exit 1
          fi
          if [ "$http_code" != "200" ]; then
            echo "::error::/health returned HTTP $http_code"
            cat /tmp/health.json 2>/dev/null || true
            exit 1
          fi
          cat /tmp/health.json

          http_db=$(curl "${curl_args[@]}" -o /tmp/health-db.json -w "%{http_code}" "$url/health/db" || true)
          if [ "$http_db" != "200" ]; then
            echo "::warning::/health/db returned HTTP $http_db — check DATABASE_URL in Vercel Production env vars"
            cat /tmp/health-db.json 2>/dev/null || true
            exit 1
          fi
          cat /tmp/health-db.json
        env:
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
